# Render Blueprint (API: server.cjs)
# Naujas Web Service → „Apply render.yaml“ arba rankiniu: Build npm ci, Start npm start.
# Slaptus raktus (RESEND, SUPABASE_SERVICE_ROLE_KEY ir kt.) įveskite Render → Environment.

services:
